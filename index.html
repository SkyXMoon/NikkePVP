<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NIKKE 竞技场充能计算器</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="nav-rail" aria-label="工具导航">
        <div class="brand-mark">NK</div>
        <div class="rail-item active">PVP</div>
        <div class="rail-item">DATA</div>
      </aside>

      <section class="workspace" aria-label="角色数据">
        <header class="topbar">
          <div>
            <p class="eyebrow">NIKKE Arena Tools</p>
            <h1>竞技场充能计算器</h1>
          </div>
          <div class="summary-strip" id="summaryStrip">选择角色后实时计算首轮爆裂</div>
        </header>

        <section class="filters" aria-label="筛选角色">
          <label class="search-field">
            <span>搜索</span>
            <input id="searchInput" type="search" placeholder="角色名 / 英文名" />
          </label>
          <label>
            <span>常用角色</span>
            <select id="commonFilter">
              <option value="common" selected>常用角色</option>
              <option value="all">全部角色</option>
            </select>
          </label>
          <label>
            <span>武器</span>
            <select id="weaponFilter">
              <option value="all">全部</option>
            </select>
          </label>
          <label>
            <span>企业</span>
            <select id="companyFilter">
              <option value="all">全部</option>
            </select>
          </label>
          <label>
            <span>阶段</span>
            <select id="stageFilter">
              <option value="all">全部</option>
            </select>
          </label>
          <label>
            <span>服务器</span>
            <select id="regionFilter">
              <option value="all">全部</option>
              <option value="global">国际服</option>
              <option value="cn" selected>国服</option>
            </select>
          </label>
        </section>

        <section class="list-header">
          <span>排序</span>
          <strong>最终每发充能效率从高到低</strong>
          <span id="listCount">0 名角色</span>
        </section>

        <section class="character-list" id="characterGrid" aria-live="polite"></section>
      </section>

      <aside class="side-panel" aria-label="队伍与结果">
        <section class="team-panel">
          <div class="panel-heading">
            <div>
              <p class="eyebrow">Team</p>
              <h2>队伍槽位</h2>
            </div>
            <button class="ghost-button" id="clearTeamButton" type="button">清空</button>
          </div>
          <div class="team-slots" id="teamSlots"></div>
        </section>

        <section class="result-panel" id="resultPanel" aria-live="polite"></section>
      </aside>
    </main>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script src="data.js"></script>
    <script src="app.js"></script>
  </body>
</html>
